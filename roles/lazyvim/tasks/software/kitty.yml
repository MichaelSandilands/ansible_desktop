---
- name: Download and run kitty installer script
  ansible.builtin.shell: |
    curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
  changed_when: false  # prevent task from always appearing changed unless you handle idempotency

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'

- name: Symlink kitty and kitten to ~/.local/bin
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.local/kitty.app/bin/{{ item }}"
    dest: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
    state: link
    force: true
  loop:
    - kitty
    - kitten

- name: Ensure ~/.local/share/applications exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/applications"
    state: directory
    mode: '0755'

- name: Copy kitty.desktop
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.local/kitty.app/share/applications/kitty.desktop"
    dest: "{{ ansible_env.HOME }}/.local/share/applications/kitty.desktop"
    remote_src: true

- name: Copy kitty-open.desktop
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.local/kitty.app/share/applications/kitty-open.desktop"
    dest: "{{ ansible_env.HOME }}/.local/share/applications/kitty-open.desktop"
    remote_src: true

- name: Update icon path in kitty desktop files
  ansible.builtin.shell: |
    sed -i "s|Icon=kitty|Icon=$(readlink -f {{ ansible_env.HOME }}/.local/kitty.app/share/icons/hicolor/256x256/apps/kitty.png)|g" {{ ansible_env.HOME }}/.local/share/applications/kitty*.desktop
  args:
    executable: /bin/bash

- name: Update exec path in kitty desktop files
  ansible.builtin.shell: |
    sed -i "s|Exec=kitty|Exec=$(readlink -f {{ ansible_env.HOME }}/.local/kitty.app/bin/kitty)|g" {{ ansible_env.HOME }}/.local/share/applications/kitty*.desktop
  args:
    executable: /bin/bash

- name: Set kitty as default terminal for xdg-terminal-exec
  ansible.builtin.copy:
    content: "kitty.desktop\n"
    dest: "{{ ansible_env.HOME }}/.config/xdg-terminals.list"
    mode: '0644'

